experiment:
  name: dueling_dqn_cartpole
  seed: 42

environment:
  name: cartpole

agent:
  name: dueling_dqn
  params:
    learning_rate: 0.001
    discount_factor: 0.99
    batch_size: 64
    buffer_size: 100000
    warmup_steps: 1000
    train_frequency: 4
    target_update_frequency: 1000
    gradient_clip: 1.0
    hidden_dims: [128, 128]
    exploration:
      strategy: epsilon_greedy
      params:
        epsilon_start: 1.0
        epsilon_end: 0.01
        decay_type: linear
        decay_steps: 50000

training:
  num_episodes: 500
  max_steps: 500
  log_frequency: 50

evaluation:
  num_episodes: 50
  success_threshold: 195.0

callbacks:
  checkpoint:
    enabled: true
    frequency: 100
  early_stopping:
    enabled: true
    patience: 50
    min_improvement: 5.0
  progress:
    enabled: true
    frequency: 50

output:
  base_dir: outputs
  save_plots: true
  save_metrics_csv: true
